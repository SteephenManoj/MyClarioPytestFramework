; [pytest]
; addopts = --headed --browser=chromium
; testpaths = tests

[pytest]
addopts = --headed --browser=chromium --alluredir=reports/allure-results --html=reports/report.html --self-contained-html
testpaths = tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s - %(levelname)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Custom settings for test data
testdata_file = testdata/TestData.xlsx
testdata_sheet = Register
