[pytest]
addopts = -p no:playwright --self-contained-html -vv --tb=short --capture=no
addopts = --headed --browser=chromium --self-contained-html
testpaths = src/test/tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s - %(levelname)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
 
# Custom settings for test data
testdata_file = src/resources/testdata/TestData.xlsx
testdata_sheet = Login
testdata_sheet = Register

markers =
    sanity: Sanity test suite
    regression: Regression test suite
    smoke: Smoke test suite
    TC_SIP_001: Test marker for SIP 001
    TC_SIP_002: Test marker for SIP 002
    TC_SIP_003: Test marker for SIP 003
    TC_SIP_004: Test marker for SIP 004



