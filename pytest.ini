[pytest]
addopts = -p no:playwright --self-contained-html -vv --tb=short --capture=no
testpaths = src/test/tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s - %(levelname)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
 
# Custom settings for test data
testdata_file = src/resources/testdata/TestData.xlsx
testdata_sheet = Login